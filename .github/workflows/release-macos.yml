name: Release macOS

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-dev.txt
          python3 -m pip install -r requirements-optional.txt

      - name: Compile Python sources
        run: python3 -m compileall -q .

      - name: Build Swiss Ephemeris extension
        run: ./scripts/build_sweastrology.sh

      - name: Build macOS app
        run: ./scripts/build_macos_app.sh

      - name: Archive app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Morinus.app "Morinus-${GITHUB_REF_NAME}-macos.zip"

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Morinus-${{ github.ref_name }}-macos.zip
          generate_release_notes: true
